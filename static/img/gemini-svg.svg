<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 100" width="100%" height="100%">
  <defs>
    <!-- Degradado premium de blanco a crema Nuvus -->
    <linearGradient id="nuvus-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1e8d7" />
    </linearGradient>
  </defs>
  
  <!-- Isotipo: "N" geométrica premium perfectamente orientada -->
  <g transform="translate(15, 10)">
    <!-- El trazo de la N ahora es 100% correcto y armónico -->
    <path d="M 15,15 L 30,15 L 55,52 L 55,15 L 70,15 L 70,65 L 55,65 L 30,28 L 30,65 L 15,65 Z" fill="url(#nuvus-grad)" />
    <!-- Órbita estética de fondo -->
    <path d="M 5,45 A 35,35 0 0,0 80,50" fill="none" stroke="#f1e8d7" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  </g>

  <!-- Logotipo: Tipografía estilo Apple premium -->
  <text x="115" y="52" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="4">NUVUS</text>
  <text x="115" y="78" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" font-weight="500" fill="#f1e8d7" letter-spacing="9">STORE</text>
</svg>
